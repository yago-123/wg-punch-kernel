name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  main-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise tools
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Run golangci-lint
        run: mise exec -- make lint
